<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天眼监护·数据中心</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0b0f19; color: #e5e7eb; min-height: 100vh; padding: 20px; background-image: radial-gradient(circle at 50% 50%, #111827 0%, #0b0f19 100%); }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* 顶部标题栏 */
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1f2937; padding-bottom: 15px; margin-bottom: 30px; }
        h1 { font-size: 20px; font-weight: 600; color: #38bdf8; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        h1::before { content: ''; display: inline-block; width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }
        
        /* 登录容器 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0f19; display: flex; justify-content: center; align-items: center; z-index: 999; }
        .login-box { background: rgba(17, 24, 39, 0.8); border: 1px solid #38bdf8; border-radius: 12px; padding: 40px 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 20px rgba(56, 189, 248, 0.15); backdrop-filter: blur(10px); }
        .login-box h2 { font-size: 18px; margin-bottom: 20px; color: #38bdf8; font-weight: 500; }
        .login-box input { width: 100%; background: #1f2937; border: 1px solid #4b5563; border-radius: 6px; padding: 12px; color: white; font-size: 16px; margin-bottom: 20px; text-align: center; outline: none; transition: border-color 0.2s; }
        .login-box input:focus { border-color: #38bdf8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.3); }
        .login-box button { background: #0284c7; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .login-box button:hover { background: #0369a1; }
        #login-error { color: #f43f5e; font-size: 14px; margin-top: 12px; font-weight: 500; }

        /* 主体列表样式 */
        #main-content { display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        /* 监控卡片 */
        .record-card { background: rgba(17, 24, 39, 0.6); border: 1px solid #1f2937; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s, border-color 0.2s; }
        .record-card:hover { transform: translateY(-2px); border-color: #38bdf8; }
        
        /* 图片展示区域 */
        .image-wrapper { width: 100%; height: 240px; background: #111827; position: relative; border-bottom: 1px solid #1f2937; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .image-wrapper img { width: 100%; height: 100%; object-fit: cover; background: #111827; }
        .image-tip { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); padding: 4px 8px; font-size: 11px; color: #9ca3af; border-radius: 4px; pointer-events: none; }
        
        /* 文本数据区域 */
        .meta-data { padding: 16px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .time-tag { font-size: 14px; font-weight: 600; color: #f3f4f6; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .gps-tag { font-size: 12px; color: #9ca3af; font-family: monospace; background: #111827; padding: 6px 10px; border-radius: 4px; margin-bottom: 14px; word-break: break-all; }
        .gps-type { color: #10b981; font-weight: normal; margin-left: 5px; font-size: 11px; }
        .gps-type.fallback { color: #eab308; }
        
        /* 地图跳转按钮组 */
        .map-actions { display: flex; gap: 10px; }
        .map-btn { flex: 1; text-align: center; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: 500; text-decoration: none; transition: background 0.2s, color 0.2s; border: 1px solid transparent; }
        .btn-gaode { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: rgba(16, 185, 129, 0.3); }
        .btn-gaode:hover { background: #10b981; color: white; }
        .btn-google { background: rgba(239, 68, 68, 0.1); color: #f43f5e; border-color: rgba(239, 68, 68, 0.3); }
        .btn-google:hover { background: #f43f5e; color: white; }

        #global-status { text-align: center; color: #9ca3af; padding: 40px; font-size: 14px; }
        .logout-btn { background: transparent; border: 1px solid #4b5563; color: #9ca3af; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .logout-btn:hover { border-color: #f43f5e; color: #f43f5e; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>🔒 安全验证中心</h2>
        <input type="password" id="pw-input" placeholder="请输入监护端安全暗号" onkeydown="if(event.keyCode==13) verifyLogin()">
        <button onclick="verifyLogin()">解锁终端</button>
        <div id="login-error"></div>
    </div>
</div>

<div class="container" id="main-content">
    <header>
        <h1>数据监护指挥中心</h1>
        <button class="logout-btn" onclick="logout()">锁定终端</button>
    </header>
    
    <div id="global-status">同步云端加密轨道数据中...</div>
    <div class="grid" id="records-grid"></div>
</div>

<script>
    // 检查本地是否记录过登录密码
    let activePw = localStorage.getItem('monitor_terminal_pw') || '';
    if (activePw) {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        fetchDashboardData(activePw);
    }

    function verifyLogin() {
        const input = document.getElementById('pw-input').value;
        if (!input) {
            showError("暗号不能为空");
            return;
        }
        fetchDashboardData(input, true);
    }

    function logout() {
        localStorage.removeItem('monitor_terminal_pw');
        window.location.reload();
    }

    function showError(msg) {
        document.getElementById('login-error').innerText = msg;
    }

    async function fetchDashboardData(targetPw, isNewLogin = false) {
        const statusDiv = document.getElementById('global-status');
        try {
            const res = await fetch(`/submit?pw=${targetPw}`);
            const result = await res.json();
            
            if (!res.ok) {
                throw new Error(result.error || "网络终端响应异常");
            }
            
            // 登录密码成功通过验证，将其保存到本地设备
            if (isNewLogin) {
                localStorage.setItem('monitor_terminal_pw', targetPw);
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }

            statusDiv.style.display = 'none';
            const grid = document.getElementById('records-grid');
            grid.innerHTML = ''; // 清空原本网格

            if (result.data.length === 0) {
                statusDiv.style.display = 'block';
                statusDiv.innerText = "🛰️ 云存储空间干净，目前暂无拍照快照。";
                return;
            }

            result.data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'record-card';
                
                // 地图底层引擎跳转链接配置
                const gaodeUrl = `https://uri.amap.com/marker?position=${item.lon},${item.lat}&name=监护上报坐标`;
                const googleUrl = `https://www.google.com/maps/search/?api=1&query=${item.lat},${item.lon}`;
                
                const isFallback = (item.lat === "0.0" || item.fileName.includes("lat0.0"));
                const typeText = isFallback ? '<span class="gps-type fallback">[基站IP位置]</span>' : '<span class="gps-type">[GPS卫星位置]</span>';

                card.innerHTML = `
                    <div class="image-wrapper">
                        <img id="img-${item.fileId}" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><text x='50%' y='50%' font-size='12' fill='%234b5563' text-anchor='middle' alignment-baseline='middle'>加载极光照片...</text></svg>" alt="监护快照">
                        <div class="image-tip">📱 长按图片可下载</div>
                    </div>
                    <div class="meta-data">
                        <div>
                            <div class="time-tag">📅 ${item.time}</div>
                            <div class="gps-tag">
                                <div>LAT: ${item.lat}</div>
                                <div>LON: ${item.lon} ${typeText}</div>
                            </div>
                        </div>
                        <div class="map-actions">
                            <a class="map-btn btn-gaode" href="${gaodeUrl}" target="_blank">🗺️ 高德地图</a>
                            <a class="map-btn btn-google" href="${googleUrl}" target="_blank">🌐 Google地图</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                
                // 异步反向代理拉取带有鉴权密钥的安全大图流并回填
                lazyLoadImage(item.fileId, item.url, item.authToken);
            });

        } catch (err) {
            if (isNewLogin) {
                showError("解密失败: " + err.message);
            } else {
                // 如果是本地旧密码失效，则自动退回登录页
                logout();
            }
        }
    }

    async function lazyLoadImage(id, url, token) {
        try {
            const res = await fetch(url, { headers: { "Authorization": token } });
            if(!res.ok) return;
            const blob = await res.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const imgElement = document.getElementById(`img-${id}`);
            if (imgElement) {
                imgElement.src = blobUrl;
            }
        } catch (e) {
            console.error("图片流拉取失败", e);
        }
    }
</script>
</body>
</html>
